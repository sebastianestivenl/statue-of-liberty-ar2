<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MindAR Tracking Test</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      padding: 10px;
      z-index: 999;
      box-sizing: border-box;
    }
    #overlay h2 {
      margin: 0;
      font-size: 18px;
    }
    #overlay p {
      margin: 5px 0 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h2>MindAR Tracking Test</h2>
  <p>Point your camera at the printed image.</p>
</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.001; filterBeta: 0.001; missTolerance: 10; warmupTolerance: 5"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-light type="ambient" intensity="1.5"></a-light>
  <a-light type="directional" position="1 2 1" intensity="2"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-box
      color="#ff0000"
      position="0 0 0"
      width="0.5"
      height="0.5"
      depth="0.5">
    </a-box>
  </a-entity>

</a-scene>
</body>
</html>
