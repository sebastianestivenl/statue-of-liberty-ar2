<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MindAR Tracking Test</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      padding: 10px;
      z-index: 999;
      box-sizing: border-box;
    }
    #overlay h2 {
      margin: 0;
      font-size: 18px;
    }
    #overlay p {
      margin: 5px 0 0 0;
      font-size: 14px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
      font-family: Arial, sans-serif;
      z-index: 999;
      padding: 8px;
      background: rgba(0,0,0,0.5);
    }
    #status.error { background: rgba(180,0,0,0.8); }
    #status.success { background: rgba(0,130,0,0.8); }
  </style>
</head>
<body>

<div id="overlay">
  <h2>MindAR Tracking Test</h2>
  <p>Point your camera at the printed image.</p>
</div>

<div id="status">⏳ Loading model...</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.001; filterBeta: 0.001; missTolerance: 10; warmupTolerance: 5"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets timeout="60000">
    <a-asset-item id="myModel" src="statue.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-light type="ambient" intensity="2"></a-light>
  <a-light type="directional" position="1 2 1" intensity="3"></a-light>
  <a-light type="directional" position="-1 1 -1" intensity="1.5"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Statue of Liberty head - big 2x2 meters -->
    <a-gltf-model
      id="statue"
      src="#myModel"
      position="0 1 0"
      scale="20 20 20"
      rotation="0 0 0">
    </a-gltf-model>

  </a-entity>

</a-scene>

<script>
  const status = document.getElementById('status');
  const asset = document.getElementById('myModel');
  const scene = document.querySelector('a-scene');

  asset.addEventListener('loaded', () => {
    status.textContent = '✅ Model loaded! Scan the image.';
    status.className = 'success';
    setTimeout(() => status.style.display = 'none', 3000);
  });

  asset.addEventListener('error', () => {
    status.textContent = '❌ Error loading model. Check filename.';
    status.className = 'error';
  });

  scene.addEventListener('loaded', () => {
    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', () => {
      status.style.display = 'block';
      status.textContent = '🎯 Target found!';
      status.className = 'success';
      setTimeout(() => status.style.display = 'none', 2000);
    });
    target.addEventListener('targetLost', () => {
      status.style.display = 'block';
      status.textContent = '👀 Keep camera on the image...';
      status.className = '';
      setTimeout(() => status.style.display = 'none', 2000);
    });
  });
</script>

</body>
</html>
