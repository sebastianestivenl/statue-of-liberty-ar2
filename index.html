<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Statue of Liberty AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
  background:rgba(0,0,0,0.65);
  color:white;
  text-align:center;
  padding:12px;
}

#overlay h2{
  margin:0;
  font-size:20px;
}

#overlay p{
  margin:5px 0 0 0;
  font-size:14px;
}

#loading{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  z-index:1000;
}

</style>
</head>

<body>

<div id="loading">
Loading AR Experience...
</div>

<div id="overlay">
  <h2>🗽 Statue of Liberty</h2>
  <p>
    Point your camera at the printed image and walk around the statue.
  </p>
</div>

<a-scene

mindar-image="
imageTargetSrc: targets.mind;
uiScanning: true;
uiLoading: true;
"

embedded
color-space="sRGB"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"

>

<a-assets>

<a-asset-item
id="statue"
src="statue.glb">
</a-asset-item>

</a-assets>

<!-- CAMERA -->

<a-camera
position="0 0 0"
look-controls="enabled:false">
</a-camera>

<!-- LIGHTING -->

<a-light
type="ambient"
intensity="1.2">
</a-light>

<a-light
type="directional"
position="1 2 1"
intensity="1.5">
</a-light>

<!-- TARGET -->

<a-entity mindar-image-target="targetIndex: 0">

<!-- STATUE -->

<a-gltf-model

src="#statue"

position="0 -1.2 0"

rotation="0 0 0"

scale="3 3 3"

shadow="receive:true;cast:true"

>

</a-gltf-model>

</a-entity>

</a-scene>

<script>

window.addEventListener("load", () => {

const loading = document.getElementById("loading");

setTimeout(() => {
loading.style.display = "none";
}, 2500);

});

</script>

</body>
</html>
